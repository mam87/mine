<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة الأم</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fff0f5; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #d63384; }
        video { width: 90%; max-width: 600px; border: 3px solid #d63384; border-radius: 10px; background: black; }
        .control-panel { margin: 20px 0; }
        input { font-size: 18px; padding: 10px; width: 60%; border: 1px solid #ccc; border-radius: 5px; }
        button { font-size: 18px; padding: 10px 20px; cursor: pointer; background-color: #d63384; color: white; border: none; border-radius: 5px; margin-left: 10px; }
        #status { margin-top: 15px; font-size: 18px; color: #555; }
    </style>
</head>
<body>

    <h1>طمأنينك يا أمي</h1>
    
    <!-- هذا الفيديو سيظهر بث الطفل -->
    <video id="remoteVideo" autoplay playsinline></video>
    
    <div class="control-panel">
        <input type="text" id="roomId" placeholder="أدخل رمز الغرفة (مثلا: ABC123)">
        <button id="connectButton">شاهد طفلك الآن</button>
    </div>
    
    <div id="status">في انتظار الاتصال...</div>

    <script>
        const connectButton = document.getElementById('connectButton');
        const remoteVideo = document.getElementById('remoteVideo');
        const roomIdInput = document.getElementById('roomId');
        const statusDiv = document.getElementById('status');

        connectButton.addEventListener('click', () => {
            const roomId = roomIdInput.value;
            if (!roomId) {
                statusDiv.textContent = 'الرجاء إدخال رمز الغرفة أولاً.';
                return;
            }

            statusDiv.textContent = `جاري محاولة الاتصال بالغرفة: ${roomId}...`;
            connectButton.disabled = true;

            // *** هنا تكمن الخطوة الأهم ***
            // يجب على هذا الكود أن يتصل بخادم الإشارة ويقول: "أريد الانضمام للغرفة ABC123"
            // ثم يستقبل معلومات الاتصال من جهاز الطفل ويقوم بإنشاء اتصال WebRTC مباشر.
            // هذا يتطلب كود WebRTC معقد.
            console.log(`طلب الانضمام للغرفة: ${roomId}`);
            
            // هذا مجرد محاكاة لنجاح الاتصال
            setTimeout(() => {
                statusDiv.textContent = 'تم الاتصال بنجاح! (هذه محاكاة فقط)';
                // remoteVideo.srcObject = streamFromChild; // في الواقع، سيتم وضع بث الطفل هنا
            }, 2000);
        });
    </script>

</body>
</html>
